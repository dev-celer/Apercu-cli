databases:
  mydb:
    source:
      provider: neon
      neon:
        project_id: "test-project"
        api_key: "test-key"
        parent_branch: "main"
        preview_branch: "preview-${{ PR_NUMBER }}"
    migration:
      image: "flyway"
      command: ["migrate"]
      env:
        DATABASE_URL: "${{ DATABASE_URL }}"
      local_dir: "./migrations"
    seed:
      - "./seeds/data.sql"
