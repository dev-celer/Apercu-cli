databases:
  mydb:
    source:
      provider: neon
      neon:
        project_id: "test-project"
        api_key: "test-key"
        parent_branch: "main"
        preview_branch: "preview-${{ PR_NUMBER }}"
        branching_type: "schema_only"
    anonymization:
      greenmask_config: "./greenmask.yaml"
      env:
        DATABASE_URL: "${{ DATABASE_URL }}"
      storage:
        neon:
          branch_name: "main-anonymized"
    migration:
      image: "flyway"
      command: ["migrate"]
      env:
        DATABASE_URL: "${{ DATABASE_URL }}"
      local_dir: "./migrations"
    seed:
      - path: "./seeds/data.sql"
        seed_on: "always"
    explain_query:
      - "./queries/test-queries.sql"